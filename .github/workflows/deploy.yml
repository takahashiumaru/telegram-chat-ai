name: Production Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Eksekusi Perintah Deploy di VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            # 1. Masuk ke direktori home user
            cd $HOME
            
            # 2. Clone repository jika belum ada
            if [ ! -d "telegram-chat-ai" ]; then
              echo "Melakukan git clone untuk pertama kali..."
              git clone https://github.com/takahashiumaru/telegram-chat-ai.git
            fi
            
            # 3. Masuk ke folder project
            cd telegram-chat-ai
            
            # 4. Paksa update kode agar 100% sama dengan GitHub (mencegah konflik)
            git fetch origin main
            git reset --hard origin/main
            
            # 5. Build ulang Docker Image
            docker build -t telegram-chat-ai:latest .
            
            # 6. Hapus container lama jika ada (NAMA SUDAH DISESUAIKAN)
            docker rm -f telegram-chat-ai || true
            
            # 7. Jalankan container baru (NAMA SUDAH DISESUAIKAN)
            docker run -d \
              --name telegram-chat-ai \
              --restart unless-stopped \
              -v /etc/timezone:/etc/timezone:ro \
              -v /etc/localtime:/etc/localtime:ro \
              telegram-chat-ai:latest
            
            # 8. Bersihkan image Docker lama untuk menghemat kapasitas disk
            docker image prune -f